    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --surface: rgba(255, 255, 255, 0.82);
        --text: #1f2f38;
        --muted: #5e6d73;
        --line: rgba(17, 100, 102, 0.16);
        --brand: #116466;
        --brand-deep: #0c4a63;
        --shadow: 0 20px 60px rgba(12, 37, 51, 0.12);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --content-width: 1080px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(17, 100, 102, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(214, 140, 69, 0.16), transparent 24%),
          linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Trebuchet MS", Tahoma, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      body[data-lang="ar"],
      body[data-lang="he"] {
        font-family: Tahoma, "Segoe UI", sans-serif;
      }

      .page-shell {
        width: min(calc(100% - 32px), var(--content-width));
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: var(--radius-xl);
        padding: 28px;
        background: linear-gradient(135deg, rgba(12, 74, 99, 0.96), rgba(17, 100, 102, 0.92));
        color: #fff;
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -80px -100px auto;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.09);
      }

      .hero-top {
        display: flex;
        gap: 16px;
        justify-content: space-between;
        align-items: flex-start;
        position: relative;
        z-index: 1;
      }

      .brand-lockup {
        max-width: 720px;
      }

      .brand-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 0.92rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .brand-title {
        margin: 16px 0 10px;
        font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.08;
      }

      .brand-lead {
        margin: 0;
        max-width: 70ch;
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.05rem;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .meta-chip {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.96);
        font-size: 0.95rem;
      }

      .lang-panel {
        min-width: 220px;
        padding: 16px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.12);
      }

      .lang-label {
        margin: 0 0 10px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 0.92rem;
      }

      .lang-options {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .lang-button {
        border: 1px solid rgba(255, 255, 255, 0.26);
        background: transparent;
        color: #fff;
        padding: 10px 14px;
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
      }

      .lang-button.is-active {
        background: #fff;
        color: var(--brand-deep);
        border-color: #fff;
        font-weight: 700;
      }

      .content-grid {
        display: grid;
        gap: 22px;
        grid-template-columns: minmax(0, 300px) minmax(0, 1fr);
        margin-top: 22px;
      }

      .toc-card,
      .content-card,
      .footer-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
      }

      .toc-card {
        align-self: start;
        position: sticky;
        top: 18px;
        padding: 22px;
      }

      .toc-title {
        margin: 0 0 14px;
        font-size: 1.05rem;
      }

      .toc-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }

      .toc-link {
        display: block;
        padding: 10px 12px;
        border-radius: 14px;
        text-decoration: none;
        color: var(--text);
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid rgba(17, 100, 102, 0.08);
      }

      .content-card {
        padding: 26px;
      }

      .section-card {
        padding: 22px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(17, 100, 102, 0.1);
      }

      .section-card + .section-card {
        margin-top: 18px;
      }

      .section-title {
        margin: 0 0 10px;
        font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: 1.45rem;
        line-height: 1.2;
        color: var(--brand-deep);
      }

      .section-text {
        margin: 0 0 12px;
      }

      .section-list {
        margin: 0;
        padding-inline-start: 22px;
      }

      .section-list li + li {
        margin-top: 8px;
      }

      .footer-card {
        margin-top: 22px;
        padding: 20px 22px;
      }

      .footer-text {
        margin: 0;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .hero-top,
        .content-grid {
          display: grid;
          grid-template-columns: 1fr;
        }

        .lang-panel,
        .toc-card {
          min-width: 0;
          position: static;
        }
      }

      @media (max-width: 640px) {
        .page-shell {
          width: min(calc(100% - 20px), var(--content-width));
          padding-top: 16px;
        }

        .hero,
        .content-card,
        .toc-card,
        .footer-card {
          border-radius: 22px;
        }

        .hero,
        .content-card {
          padding: 20px;
        }

        .section-card {
          padding: 18px;
        }
      }
    </style>
  </head>

      const brandKicker = document.getElementById("brand-kicker");
      const pageTitle = document.getElementById("page-title");
      const pageLead = document.getElementById("page-lead");
      const languageLabel = document.getElementById("language-label");
      const effectiveDate = document.getElementById("effective-date");
      const policyScope = document.getElementById("policy-scope");
      const tocTitle = document.getElementById("toc-title");
      const tocList = document.getElementById("toc-list");
      const sectionsRoot = document.getElementById("sections-root");
      const footerText = document.getElementById("footer-text");
      const langButtons = document.querySelectorAll(".lang-button");

      function detectInitialLanguage() {
        const fromQuery = new URLSearchParams(window.location.search).get("lang");
        if (fromQuery && content[fromQuery]) {
          return fromQuery;
        }

        const browserLanguage = (navigator.language || "en").toLowerCase();
        if (browserLanguage.startsWith("ar")) {
          return "ar";
        }
        if (browserLanguage.startsWith("he") || browserLanguage.startsWith("iw")) {
          return "he";
        }
        return "en";
      }

      function renderLanguage(lang) {
        const entry = content[lang] || content.en;
        document.documentElement.lang = entry.htmlLang;
        document.documentElement.dir = entry.dir;
        document.body.dir = entry.dir;
        document.body.dataset.lang = lang;
        document.title = `MTA Auto Spare - ${entry.pageTitle}`;

        brandKicker.textContent = entry.brandKicker;
        pageTitle.textContent = entry.pageTitle;
        pageLead.textContent = entry.pageLead;
        languageLabel.textContent = entry.languageLabel;
        effectiveDate.textContent = entry.effectiveDate;
        policyScope.textContent = entry.policyScope;
        tocTitle.textContent = entry.tocTitle;
        footerText.textContent = entry.footer;

        tocList.innerHTML = "";
        sectionsRoot.innerHTML = "";

        for (const section of entry.sections) {
          const tocItem = document.createElement("li");
          const tocLink = document.createElement("a");
          tocLink.className = "toc-link";
          tocLink.href = `#${section.id}`;
          tocLink.textContent = section.title;
          tocItem.appendChild(tocLink);
          tocList.appendChild(tocItem);

          const article = document.createElement("article");
          article.className = "section-card";
          article.id = section.id;

          const title = document.createElement("h2");
          title.className = "section-title";
          title.textContent = section.title;
          article.appendChild(title);

          for (const paragraphText of section.paragraphs || []) {
            const paragraph = document.createElement("p");
            paragraph.className = "section-text";
            paragraph.textContent = paragraphText;
            article.appendChild(paragraph);
          }

          if (section.items && section.items.length) {
            const list = document.createElement("ul");
            list.className = "section-list";
            for (const itemText of section.items) {
              const item = document.createElement("li");
              item.textContent = itemText;
              list.appendChild(item);
            }
            article.appendChild(list);
          }

          sectionsRoot.appendChild(article);
        }

        for (const button of langButtons) {
          button.classList.toggle("is-active", button.dataset.lang === lang);
        }

        const url = new URL(window.location.href);
        url.searchParams.set("lang", lang);
        history.replaceState(null, "", url);
      }

      for (const button of langButtons) {
        button.addEventListener("click", () => renderLanguage(button.dataset.lang));
      }

      renderLanguage(detectInitialLanguage());
    </script>
